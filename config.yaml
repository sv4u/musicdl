version: "1.2"

# Spotify API credentials (required). Get from https://developer.spotify.com/dashboard
spotify:
  client_id: "your_spotify_client_id"
  client_secret: "your_spotify_client_secret"

download:
  threads: 2
  max_retries: 5
  format: mp3
  bitrate: 128k
  output: "{artist}/{album}/{disc-number}{track-number} - {title}.{output-ext}"
  # Audio providers for search (tried in order when matching Spotify tracks).
  # Supported: youtube-music, youtube, soundcloud, audius
  # Note: bandcamp has no search — use direct URLs only.
  audio_providers:
    - youtube-music
    - youtube
    # - soundcloud
    # - audius
  overwrite: metadata

rate_limits:
  spotify_retries: 1
  youtube_retries: 3
  youtube_bandwidth: 1048576

# Music sources: songs, artists, playlists, albums.
# Supported URL types per source:
#   Spotify:    tracks, albums, artists, playlists
#   YouTube:    videos, playlists
#   SoundCloud: tracks, sets (playlists), user pages (artists)
#   Bandcamp:   tracks, albums, artist pages (full discography)
#   Audius:     tracks, playlists

songs: []
  # - name: "SoundCloud Track"
  #   url: https://soundcloud.com/artist/track-name
  # - name: "Bandcamp Track"
  #   url: https://artist.bandcamp.com/track/track-name
  # - name: "Audius Track"
  #   url: https://audius.co/artist/track-name

artists:
